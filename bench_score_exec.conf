# bench-score execution spec
#
# Default mode keeps platform-specific executable/build defaults inside
# benchmark_runner.c. Uncomment paths only when scoring another SQL processor.

constraint_mode=pkuk
expected_failure_errors=4

# Other SQL processor example:
# sql_exe=/absolute/path/to/sqlprocessor
# generator_exe=./bench_workload_generator
# build_cmd=
# memtrack_build_cmd=
#
# If the target CSV schema has plain column names such as
# id,email,phone,name,... instead of id(PK),email(UK),phone(UK),...
# use:
# constraint_mode=plain
# expected_failure_errors=0
